<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Shroom Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/shroom_favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .settings-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: var(--space-8);
    }

    @media (max-width: 1024px) {
      .settings-grid {
        grid-template-columns: 1fr;
      }
    }

    .settings-card {
      background: var(--theme-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--theme-border);
      padding: var(--space-8);
      margin-bottom: var(--space-8);
    }

    .settings-card h3 {
      font-size: var(--font-size-2xl);
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--theme-border);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }

    .avatar-upload img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--theme-border);
    }

    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }

    .switch-label {
      font-weight: 500;
    }

    @media (max-width: 360px) {
      .avatar-upload {
        gap: var(--space-4);
      }

      .avatar-upload .btn {
        padding: var(--space-2) var(--space-4);
        font-size: var(--font-size-sm);
        white-space: nowrap;
      }
    }

    .switch-desc {
      font-size: var(--font-size-sm);
      color: var(--theme-text-muted);
    }

    .switch-control {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch-control input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: var(--theme-border);
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--color-secondary);
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }
  </style>
</head>

<body class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="nav-brand" style="margin: 0 auto;">
        <img src="assets/images/shroom_logo.svg" alt="Shroom" height="36" style="display:block;">
      </a>
    </div>
    <div class="sidebar-profile">
      <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=100&auto=format&fit=crop" alt="Avatar">
      <div class="profile-info">
        <span class="profile-name">Leo Mushroom</span>
        <span class="profile-role">Pro Grower</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-layout-dashboard">
          <rect width="7" height="9" x="3" y="3" rx="1" />
          <rect width="7" height="5" x="14" y="3" rx="1" />
          <rect width="7" height="9" x="14" y="12" rx="1" />
          <rect width="7" height="5" x="3" y="16" rx="1" />
        </svg>
        Overview
      </a>
      <a href="dashboard-orders.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-package">
          <path d="m7.5 4.27 9 5.15" />
          <path
            d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
          <path d="m3.3 7 8.7 5 8.7-5" />
          <path d="M12 22V12" />
        </svg>
        My Orders
      </a>
      <a href="dashboard-courses.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-book-open">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        My Courses
      </a>
      <a href="dashboard-settings.html" class="sidebar-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-settings">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="login.html" class="sidebar-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-log-out">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" x2="9" y1="12" y2="12" />
        </svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-main">
    <header class="dashboard-header">
      <div style="display: flex; align-items: center; gap: var(--space-4);">
        <button class="dashboard-toggle-btn" aria-label="Toggle Sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-menu">
            <line x1="4" x2="20" y1="12" y2="12" />
            <line x1="4" x2="20" y1="6" y2="6" />
            <line x1="4" x2="20" y1="18" y2="18" />
          </svg>
        </button>
        <h2 class="dash-header-title">Settings</h2>
      </div>

      <div class="dash-header-tools">
        <button type="button" class="tool-btn rtl-toggle-btn" aria-label="Toggle RTL">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-arrow-left-right">
            <path d="M8 3 4 7l4 4" />
            <path d="M4 7h16" />
            <path d="m16 21 4-4-4-4" />
            <path d="M20 17H4" />
          </svg>
        </button>
        <button type="button" class="tool-btn theme-toggle-btn" aria-label="Toggle Theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-moon">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        </button>
        <button class="notification-btn" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-bell">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
          </svg>
          <span class="notification-badge"></span>
        </button>
      </div>
    </header>

    <div class="dashboard-content fade-in">

      <div class="settings-grid">
        <!-- Left Col -->
        <div>
          <!-- Profile Card -->
          <div class="settings-card fade-in">
            <h3>Profile Information</h3>
            <div class="avatar-upload">
              <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=150&auto=format&fit=crop"
                alt="Profile">
              <div>
                <button class="btn btn-secondary" style="margin-bottom: var(--space-2);">Change Photo</button>
                <p style="font-size: var(--font-size-sm); color: var(--theme-text-muted);">JPG or PNG, max 2MB</p>
              </div>
            </div>
            <form action="#" class="auth-form" onsubmit="event.preventDefault(); alert('Saved!');">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">First Name</label>
                  <input type="text" class="form-input" value="Leo">
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name</label>
                  <input type="text" class="form-input" value="Mushroom">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" value="leo@example.com">
              </div>
              <div class="form-group">
                <label class="form-label">Bio (Optional)</label>
                <textarea class="form-input" rows="4"
                  placeholder="Tell the community what you're growing..."></textarea>
              </div>
              <div style="text-align: center; margin-top: var(--space-4);">
                <button type="submit" class="btn btn-primary">Save Profile</button>
              </div>
            </form>
          </div>

          <!-- Password Card -->
          <div class="settings-card fade-in" style="animation-delay: 0.1s;">
            <h3>Change Password</h3>
            <form action="#" class="auth-form" onsubmit="event.preventDefault(); alert('Password updated! (Mock)');">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" placeholder="••••••••">
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" placeholder="••••••••">
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-input" placeholder="••••••••">
              </div>
              <div style="text-align: center; margin-top: var(--space-4);">
                <button type="submit" class="btn btn-secondary">Update Password</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Right Col (Notifications & Preferences) -->
        <div>
          <div class="settings-card fade-in" style="animation-delay: 0.2s;">
            <h3>Notifications</h3>

            <div class="toggle-switch">
              <div>
                <div class="switch-label">Order Updates</div>
                <div class="switch-desc">Shipment tracking and status</div>
              </div>
              <label class="switch-control">
                <input type="checkbox" checked>
                <span class="slider"></span>
              </label>
            </div>

            <div class="toggle-switch">
              <div>
                <div class="switch-label">Course Announcements</div>
                <div class="switch-desc">New lessons and instructor notes</div>
              </div>
              <label class="switch-control">
                <input type="checkbox" checked>
                <span class="slider"></span>
              </label>
            </div>

            <div class="toggle-switch">
              <div>
                <div class="switch-label">Newsletter</div>
                <div class="switch-desc">Weekly farm updates and tips</div>
              </div>
              <label class="switch-control">
                <input type="checkbox">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>

      </div>

    </div>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>

</html>
