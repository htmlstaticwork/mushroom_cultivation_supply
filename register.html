<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Shroom</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/shroom_favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <main class="auth-page">
    <div class="auth-card fade-in">

      <!-- Toggles positioned top-right -->
      <div class="auth-toggles">
        <button type="button" class="tool-btn rtl-toggle-btn" aria-label="Toggle Navigation Direction"
          title="Toggle RTL">
          <svg xmlns="http://www.w3.org/-2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-arrow-left-right">
            <path d="M8 3 4 7l4 4" />
            <path d="M4 7h16" />
            <path d="m16 21 4-4-4-4" />
            <path d="M20 17H4" />
          </svg>
        </button>
        <button type="button" class="tool-btn theme-toggle-btn" aria-label="Toggle Theme" title="Toggle Theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-moon">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        </button>
      </div>

      <div class="auth-header" style="padding-top: var(--space-4);">
        <a href="index.html" class="auth-logo">
          <img src="assets/images/shroom_logo.svg" alt="Shroom" height="48" style="display:block; margin: 0 auto;">
        </a>
        <p class="section-subtitle" style="font-size: var(--font-size-base); margin-bottom: 0;">Join the cultivator
          community.</p>
      </div>

      <form class="auth-form" action="dashboard.html" method="GET">
        <div class="form-group">
          <label for="fname" class="form-label">First Name</label>
          <div class="form-input-container">
            <input type="text" id="fname" class="form-input" placeholder="Leo" required>
          </div>
        </div>

        <div class="form-group">
          <label for="lname" class="form-label">Last Name</label>
          <div class="form-input-container">
            <input type="text" id="lname" class="form-input" placeholder="Mushroom" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <div class="form-input-container">
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="form-input-container">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            <button type="button" class="input-icon-btn" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-eye">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="cpassword" class="form-label">Confirm Password</label>
          <div class="form-input-container">
            <input type="password" id="cpassword" class="form-input" placeholder="••••••••" required>
            <button type="button" class="input-icon-btn" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-eye">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="auth-options" style="margin-top: var(--space-2);">
          <label class="checkbox-label">
            <input type="checkbox" name="terms" required>
            <span>I accept the <a href="#" class="auth-link">Terms & Conditions</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--space-2);">Register</button>
      </form>

      <div class="auth-divider">
        <span>or continue with</span>
      </div>

      <div class="auth-form">

        <!-- Google -->
        <button type="button" class="btn btn-secondary btn-block"
          style="border-color: var(--theme-border); justify-content: center; background: var(--theme-bg);">
          <svg style="margin-right: 8px; flex-shrink: 0;" width="18" height="18" viewBox="0 0 48 48"
            xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335"
              d="M24 9.5c3.1 0 5.6 1.1 7.6 2.9l5.6-5.6C33.9 3.5 29.3 1.5 24 1.5 14.9 1.5 7.2 7.1 3.9 15l6.6 5.1C12.2 13.6 17.6 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.5 6.7l6.9 5.4c4-3.7 6.3-9.2 6.3-16.1z" />
            <path fill="#FBBC05"
              d="M10.5 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.9-4.6L3.9 14.3A22.6 22.6 0 0 0 1.5 24c0 3.6.9 7 2.4 10l6.6-5.4z" />
            <path fill="#34A853"
              d="M24 46.5c5.3 0 9.8-1.8 13-4.8l-6.9-5.4c-1.8 1.2-4.1 1.9-6.1 1.9-6.4 0-11.8-4.3-13.5-10.1l-6.6 5.4C7.2 40.9 14.9 46.5 24 46.5z" />
          </svg>
          <span>Continue with Google</span>
        </button>

        <!-- Email -->
        <button type="button" class="btn btn-secondary btn-block"
          style="border-color: var(--theme-border); justify-content: center;">
          <svg style="margin-right: 8px; flex-shrink: 0;" width="18" height="18" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path fill="#8B6914"
              d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z" />
          </svg>
          <span>Continue with Email</span>
        </button>

      </div>
      <p
        style="text-align: center; margin-top: var(--space-6); font-size: var(--font-size-sm); color: var(--theme-text-muted);">
        Already have an account? <a href="login.html" class="auth-link">Login here</a>
      </p>

    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>

</html>
