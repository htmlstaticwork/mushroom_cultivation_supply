<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shroom - Mushroom Cultivation Supply & Education</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/shroom_favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <main class="auth-page">
    <!-- Toggles positioned top-right -->
    <div class="auth-toggles">
      <button type="button" class="tool-btn rtl-toggle-btn" aria-label="Toggle Navigation Direction" title="Toggle RTL">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-arrow-left-right">
          <path d="M8 3 4 7l4 4" />
          <path d="M4 7h16" />
          <path d="m16 21 4-4-4-4" />
          <path d="M20 17H4" />
        </svg>
      </button>
      <button type="button" class="tool-btn theme-toggle-btn" aria-label="Toggle Theme" title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-moon">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
      </button>
    </div>

    <div class="auth-card fade-in">



      <div class="auth-header" style="padding-top: var(--space-4);">
        <a href="index.html" class="auth-logo">
          <img src="assets/images/shroom_logo.svg" alt="Shroom" height="64" style="display:block; margin: 0 auto;">
        </a>
        <p class="section-subtitle" style="font-size: var(--font-size-base); margin-bottom: 0;">Welcome back Tto Shroom,
          grower.
        </p>
      </div>

      <form class="auth-form" action="dashboard.html" method="GET">
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <div class="form-input-container">
            <input type="email" id="email" class="form-input" placeholder="" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="form-input-container">
            <input type="password" id="password" class="form-input" placeholder="" required>
            <button type="button" class="input-icon-btn" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-eye">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span>Remember Me</span>
          </label>
          <a href="#" class="auth-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--space-2);">Login</button>
      </form>

      <div class="auth-divider">
        <span>or continue with</span>
      </div>

      <div class="auth-form">

        <!-- Google -->
        <button type="button" class="btn btn-secondary btn-block"
          style="border-color: var(--theme-border); justify-content: center; background: var(--theme-bg);">
          <svg style="margin-right: 8px; flex-shrink: 0;" width="18" height="18" viewBox="0 0 48 48"
            xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335"
              d="M24 9.5c3.1 0 5.6 1.1 7.6 2.9l5.6-5.6C33.9 3.5 29.3 1.5 24 1.5 14.9 1.5 7.2 7.1 3.9 15l6.6 5.1C12.2 13.6 17.6 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.5 6.7l6.9 5.4c4-3.7 6.3-9.2 6.3-16.1z" />
            <path fill="#FBBC05"
              d="M10.5 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.9-4.6L3.9 14.3A22.6 22.6 0 0 0 1.5 24c0 3.6.9 7 2.4 10l6.6-5.4z" />
            <path fill="#34A853"
              d="M24 46.5c5.3 0 9.8-1.8 13-4.8l-6.9-5.4c-1.8 1.2-4.1 1.9-6.1 1.9-6.4 0-11.8-4.3-13.5-10.1l-6.6 5.4C7.2 40.9 14.9 46.5 24 46.5z" />
          </svg>
          <span>Continue with Google</span>
        </button>

        <!-- Apple -->
        <button type="button" class="btn btn-secondary btn-block"
          style="border-color: var(--theme-border); justify-content: center; background: var(--theme-bg);">
          <svg style="margin-right: 8px; flex-shrink: 0;" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M16.946 12.353c-.024-3.084 2.518-4.57 2.632-4.641-1.428-2.091-3.64-2.39-4.425-2.42-1.884-.191-3.68 1.11-4.636 1.11-.955 0-2.443-1.09-3.98-1.059-2.016.035-3.87 1.171-4.908 2.973-2.097 3.639-.537 9.022 1.503 11.979 1.002 1.442 2.181 3.037 3.738 2.986 1.505-.052 2.072-.962 3.882-.962 1.808 0 2.327.962 3.896.93 1.62-.033 2.633-1.458 3.618-2.906 1.144-1.674 1.616-3.298 1.636-3.385-.035-.015-3.175-1.218-3.194-4.832v.227zm-2.903-5.267c.801-.97 1.341-2.321 1.194-3.674-1.157.047-2.585.772-3.41 1.733-.658.758-1.306 2.146-1.134 3.475 1.293.1 2.617-.611 3.35-1.534z" />
          </svg>
          <span>Continue with Apple</span>
        </button>



      </div>

      <p
        style="text-align: center; margin-top: var(--space-6); font-size: var(--font-size-sm); color: var(--theme-text-muted);">
        Don't have an account? <a href="register.html" class="auth-link">Register here</a>
      </p>

    </div>
  </main>

  <script src="assets/js/main.js"></script>
</body>

</html>
